data:
  input_path: data/ideology_news-stratified_year_balanced.csv        # Path to your dataset
  text_column: content           # Column containing text
  label_column: bias_text            # Column containing labels

  # Optional preprocessing
  drop_na_text: true
  drop_na_label: true
  enforce_unique_id: false

split:
  train_size: 0.8
  validation_size: 0.1
  test_size: 0.1
  random_state: 42
  stratify: true

model:
  model_name: answerdotai/ModernBERT-base
  num_labels: 2                      # 2 = binary
  max_length: 1024                   # Max token length (optional)

training:
  output_dir: outputs/ideology
  learning_rate: 2e-5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  num_train_epochs: 3
  weight_decay: 0.01

  # Optional Trainer settings
  evaluation_strategy: epoch
  save_strategy: epoch
  logging_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: f1
  greater_is_better: true
  save_total_limit: 2
  seed: 42
