data:
  input_path: data/train.csv
  text_column: text
  label_column: label
  id_column: id

split:
  train_size: 0.8
  validation_size: 0.1
  test_size: 0.1
  random_state: 42
  stratify: true

model:
  model_name: distilbert-base-uncased
  num_labels: 3

training:
  output_dir: outputs/run_001
  learning_rate: 2.0e-5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  num_train_epochs: 3
  weight_decay: 0.01
